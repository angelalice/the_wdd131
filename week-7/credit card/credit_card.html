
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card Form</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="credit_card.css"/>
    <script src="credit_card.js" defer></script>
  </head>
  <body>
    <main>
      <section class="errors"></section>
      <form id="checkoutForm" action="completed.html" method="get">
        <div id="card_front">
          <!-- Label for the Total -->
            <p id="totalLabel"> TOTAL: $199 </p>

            <!-- Credit Card Icon-->
            <p id="card-icon">💳</p>

            <!-- Container for credit card details -->
            <p id="creditCardNumberContainer" role="region" aria-labelledby="creditCardLabel">
                <label id="creditCardLabel" for="creditCardNumber">CARD NUMBER</label>
                <input
                type="text"
                id="creditCardNumber"
                name="creditCardNumber"
                pattern="[0-9]{16}"
                placeholder="1234 5678 9101 1020"
                required
                />
            </p>

            <!-- Info for the Card Holder -->
            <div id ="cardHolderContainer">
              <label for="cardHolder" id="cardHolderLabel">CARD HOLDER</label>
              <input type="text" id="cardHolder" name="cardHolder" placeholder="John Doe" required>
            </div>
            

            <!-- Container for the Expiration Day -->
            <div id="cardExpiration">
              <label for="expirationDate">EXPIRATION</label>
              <input type='text' id='month' name="expMonth" placeholder="MM" aria-labelledby="expirationDate" required>
              <input type='text' id='year' name="expYear" placeholder="YY" aria-labelledby="expirationDate" required>
            </div>
        </div>
        
       <div id="card_back">
          <div id="stripe"></div>
          <div id="cvcContainer">
            <!-- Info for the CVC/CVV -->
            <label for="cvc" id="cvcLabel">CVC/CVV</label>
            <input type="text" id="cvc" name="cvc" placeholder="xxx" required>
          </div>
          
       </div>
       
        
        <!-- Submit Button -->
        <button type="submit">Submit</button>

      </form>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="card.css">
    <script src="card.js" defer> </script>
    <title>Character Card</title>
</head>
<body>
    <div class="card">
        <div id="diedMessage" hidden>
            <h2 id="deadAlert" >DEAD</h2>
            <p id="thanks">Thanks for playing</p>
        </div>
        
        <img class="image" src="cuzzipoozy.png" alt="Snortleblat" >
        <div class="character_name">
            
        </div>
        
        <div class="stats">
           
        </div> 

        <button class="buttons" id="attacked">Attacked</button>
        <button class="buttons" id="level_up">Level Up</button>
        <button class="buttons" id="more_health">More Health</button>
    </div>
</body>
</html>

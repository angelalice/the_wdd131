<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Cuzzipoozy Character Card">
    <meta property="og:description" content="Fun game where you can increase and decrease your character's  level and health!">
    <meta property="og:url" content="https://angelalice.github.io/the_wdd131/week-8/character_card/card.html">
    <meta property="og:image" content="https://angelalice.github.io/the_wdd131/week-8/character_card/cuzzipoozy.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cuzzipoozy Character Card">
    <meta name="twitter:description" content="Fun game where you can increase and decrease your character's  level and health!">
    <meta name="twitter:image" content="https://angelalice.github.io/the_wdd131/week-8/character_card/cuzzipoozy.png"">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">







    <link rel="stylesheet" href="card.css">
    <script src="card.js" defer> </script>
    <title>Character Card</title>
</head>
<body>
    <div class="card">
        <div id="diedMessage" hidden>
            <h2 id="deadAlert" >DEAD</h2>
            <p id="thanks">Thanks for playing</p>
        </div>
        
        <img class="image" src="cuzzipoozy.png" alt="Snortleblat" >
        <div class="character_name">
            
        </div>
        
        <div class="stats">
           
        </div> 

        <button class="buttons" id="attacked">Attacked</button>
        <button class="buttons" id="level_up">Level Up</button>
        <button class="buttons" id="more_health">More Health</button>
    </div>
</body>
</html>

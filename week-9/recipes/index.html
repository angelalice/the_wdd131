<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Page that has fun recipe ideas!">
    <meta property="og:url" content="https://angelalice.github.io/the_wdd131/week-9/recipes/index.html">
    <meta property="og:image" content="https://angelalice.github.io/the_wdd131/week-9/recipes/images/apple-crisp.jpg">


    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Web page that displays fun dessert recipe ideas!">
    <meta name="twitter:image" content="https://angelalice.github.io/the_wdd131/week-9/recipes/index.html">


    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">


    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
   
    <!-- Font Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">


    <!-- Connects files to the HTML -->
    <link rel ="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
   
    <title>Recipe Book</title>
</head>
<body>
    <!--Add book image in front of h1-->
    <header id="header">
        <img id="logo" src="images/recipe-book.png" alt="Recipe Book Logo">
        <h1>RecipeBook</h1>
    </header>

    <main id="content">
        <div class="organizer"> 
            
            <!--Create form and label for input-->
            <form class="search-container">
                <label for="search">Search for recipe</label>
                <input type="text" id="search" placeholder="Find a recipe">
                <hr id="search-decor">
               
                <button id="forSearch" type = "submit" aria-label="Search">
                    <img src="images/search.svg" alt="magnifying glass icon" class="search-icon">
                </button>
            </form>
           
            <hr id="content-spacer">


            <article id="food_container"> </article>
             
        </div>
               
               
           
       </div>  


    </main>


    <footer>
        <!--Social media logos-->
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img class = "icons" src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img class = "icons" src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img class = "icons"src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>  


         <a id= "link" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>


    </footer>


</body>
</html>

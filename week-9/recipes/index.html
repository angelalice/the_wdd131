<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    
    <!-- Font Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Connects files to the HTML -->
    <link rel ="stylesheet" href="recipes.css">
    
    <title>Recipe Book</title>
</head>
<body>
    <!--Add book image in front of h1-->
    <h1>Recipe Book</h1>

    <main id="content">
        <!--Create form and label for input-->
        <div class="search-container">
            <input type="text" id="search" placeholder="Find a recipe">
            <img src="search-icon.png" alt="search icon" class="search-icon">
        </div>
           
        <hr>
        <section id="main_info">
           <img id="apple" src = "images/apple-crisp.jpg" alt = "Image of apple crisp and vanilla ice cream">
           
            <div id="dessert_rating">
                <button>dessert</button>
                <!--Dessert Name-->
                <p>Apple Crisp</p>
                
                <!--Dessert Rating-->               
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                
            </div>
        </section>
        
        <!--Social media logos-->
        <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img class = "icons" src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img class = "icons" src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img class = "icons"src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>    
    </main>

                 
         
</body>

<footer>
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
</footer>

</html>
